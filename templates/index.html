<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Selector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

</head>


<body>
    <h1>餐廳篩選器</h1>

    <div id="filter-form">
        <h3>選擇餐廳類型：</h3>
        {% for type in all_types %}
        <label>
            <input type="checkbox" class="type-checkbox" value="{{ type }}">
            {{ type }}
        </label>
        {% endfor %}
        <button type="button" id="submit-btn">隨機推薦</button>
    </div>

    <hr>

    <div id="result-section" style="display: none;">
        <h3>為您推薦的餐廳：</h3>
        <div id="restaurant-cards" class="card-wrapper"></div>

    </div>

    <div id="map"></div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./static/map.js"></script>
    <script>
        document.getElementById('submit-btn').addEventListener('click', function () {
            // 1. 取得所有被勾選的類型
            const checkboxes = document.querySelectorAll('.type-checkbox:checked');
            const selectedTypes = Array.from(checkboxes).map(cb => cb.value);

            if (selectedTypes.length === 0) {
                alert('請至少選擇一個類型！');
                return;
            }

            // 2. 使用 Fetch 發送 POST 請求到 /filter
            fetch('/filter', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ types: selectedTypes })
            })
                .then(response => response.json())
                .then(data => {
                    const cardWrapper = document.getElementById('restaurant-cards');
                    const section = document.getElementById('result-section');

                    // 清空舊的內容
                    cardWrapper.innerHTML = '';

                    if (data.length > 0) {
                        // 3. 將回傳的 JSON 資料轉化為 HTML 標籤
                        data.forEach(rest => {
                            const card = `
                    <div class="restaurant-card">
                        <h3 class="name">${rest.name}</h3>
                        <div class="type-tag">類型: ${rest.type}</div>
                        <div class="price">價位: ${rest.price}</div>
                        <div class="rating">評分: ${rest.rating}</div>
                    </div>
                `;
                            cardWrapper.innerHTML += card;
                        });
                        section.style.display = 'block'; // 顯示結果
                    } else {
                        const message = `<p>找不到相符的餐廳</p>`;
                        cardWrapper.innerHTML += message;
                        section.style.display = 'block';
                    }
                })
                .catch(error => console.error('Error:', error));
        });
    </script>
</body>

</html>
