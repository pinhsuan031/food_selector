<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Selector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

</head>


<body class="page-container">
    <h1>餐廳篩選器</h1>

    <div id="filter-form">
        <h3 class="section-header">選擇餐廳類型：</h3>
        <div class="cuisine-grid-wrapper">
            <div class="cuisine-grid">
                <label class="checkbox-label">
                    <input type="checkbox" class="type-checkbox" id="select-all"> 全選
                </label>
                {% for type in all_types %}
                <label class="checkbox-label">
                    <input type="checkbox" class="type-checkbox" value="{{ type }}">
                    {{ type }}
                </label>
                {% endfor %}
            </div>
            <button type="button" id="submit-btn">隨機推薦</button>
        </div>
    </div>

    <hr>

    <h3>為您推薦的餐廳：</h3>
    <div class="results-grid">
        <div id="restaurant-cards" class="card-wrapper" style="display: none;"></div>

        <div id="map"></div>
    </div>


    <script src="./static/map.js"></script>
    <script>
        // 全選功能
        const selectAllBox = document.getElementById('select-all');
        const typeCheckboxes = document.querySelectorAll('.type-checkbox');

        selectAllBox.addEventListener('change', function () {
            // 讓所有類型的 checkbox 狀態與「全選」方塊同步
            typeCheckboxes.forEach(cb => {
                cb.checked = selectAllBox.checked;
            });
        });

        // 選項連動回全選按鈕 (選填：當手動勾滿所有選項時，自動勾起全選)
        typeCheckboxes.forEach(cb => {
            cb.addEventListener('change', function () {
                const allChecked = Array.from(typeCheckboxes).every(c => c.checked);
                selectAllBox.checked = allChecked;
            });
        });


        // 按下推薦後回傳餐廳資料
        document.getElementById('submit-btn').addEventListener('click', function () {
            // 1. 取得所有被勾選的類型
            const checkboxes = document.querySelectorAll('.type-checkbox:checked');
            const selectedTypes = Array.from(checkboxes).map(cb => cb.value);

            if (selectedTypes.length === 0) {
                alert('請至少選擇一個類型！');
                return;
            }

            // 清除地圖上舊的標記
            for (let key in activeMarkers) {
                map.removeLayer(activeMarkers[key]);
            }
            activeMarkers = {};

            // 2. 使用 Fetch 發送 POST 請求到 /filter
            fetch('/filter', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ types: selectedTypes })
            })
                .then(response => response.json())
                .then(data => {
                    const cardWrapper = document.getElementById('restaurant-cards');
                    // const section = document.getElementById('result-section');

                    // 清空舊的內容
                    cardWrapper.innerHTML = '';

                    if (data.length > 0) {
                        // 3. 將回傳的 JSON 資料轉化為 HTML 標籤
                        data.forEach(rest => {
                            const card = `
                    <div class="restaurant-card" data-lat="${rest.lat}" data-lng="${rest.lng}">
                        <a class="name" href=${rest.link} target="_blank" rel="noopener noreferrer">${rest.name}</a>
                        <div class="type-tag">類型: ${rest.type}</div>
                        <div class="price">價位: ${rest.price}</div>
                        <div class="rating">評分: ${rest.rating}</div>
                    </div>
                `;
                            cardWrapper.innerHTML += card;
                        });
                        cardWrapper.style.display = 'block'; // 顯示結果
                    } else {
                        const message = `<p>找不到相符的餐廳</p>`;
                        cardWrapper.style.display = 'block';
                        cardWrapper.innerHTML += message;
                    }
                })
                .catch(error => console.error('Error:', error));
        });

        // 監聽卡片容器的點擊事件
        var activeMarkers = {};

        document.getElementById('restaurant-cards').addEventListener('click', function (e) {
            // 找到被點擊的元素所屬的 .restaurant-card
            const card = e.target.closest('.restaurant-card');

            if (card) {
                // 1. 從 data 屬性取出經緯度
                const lat = parseFloat(card.getAttribute('data-lat'));
                const lng = parseFloat(card.getAttribute('data-lng'));
                const name = card.querySelector('.name').innerText;

                if (lat && lng) {
                    // 2. 移動地圖中心點 (panTo)
                    map.panTo([lat, lng]);

                    // 檢查是否已經為這家餐廳建立過標記
                    // 使用「名稱+經緯度」作為唯一 key，避免重複建立
                    const markerKey = `${name}_${lat}_${lng}`;

                    if (!activeMarkers[markerKey]) {
                        // 如果還沒有這個標記，就建立一個新的並加入地圖
                        activeMarkers[markerKey] = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>${name}</b>`)
                            .openPopup();
                    } else {
                        // 如果已經有了，就直接打開它的彈窗即可
                        activeMarkers[markerKey].openPopup();
                    }
                }
            }
        });



    </script>
</body>

</html>
